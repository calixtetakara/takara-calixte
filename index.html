<!doctype html>
<html lang="fr" style="scroll-behavior: smooth; background-color: #FFFFFF;">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Bloque le fond noir natif des smartphones en mode sombre pendant le chargement -->
    <meta name="color-scheme" content="light" />
    <meta name="theme-color" content="#FFFFFF" />

    <!-- CORRECTION : Remplacement par la balise standard demandée pour éviter l'avertissement -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Takara Calixte" />
    <link rel="apple-touch-icon" href="/logo1.png" />

    <!-- Titre de la page dans l'onglet -->
    <title>TAKARA K. Calixte — Développeur & Graphiste Designer</title>

    <!-- Favicon — icône de votre portfolio dans l'onglet -->
    <link rel="icon" type="image/png" href="/logo1.png" />

    <!-- Google Fonts Poppins -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />

    <!-- Open Graph — Configuration des informations lors du partage de votre lien -->
    <meta property="og:title" content="TAKARA Calixte — Portfolio Officiel" />
    <meta property="og:description" content="Étudiant en Licence Professionnelle en Génie Logiciel, Développeur Web & Mobile et Graphiste Designer. Découvrez mes réalisations numériques." />
    <meta property="og:image" content="/calixte.png" />
    <meta property="og:url" content="https://github.com" />
    <meta property="og:type" content="website" />

    <!-- Twitter Card — Rendu visuel optimisé pour Twitter/X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TAKARA Calixte — Portfolio" />
    <meta name="twitter:description" content="Architectures logicielles fluides et designs graphiques sur-mesure." />
    <meta name="twitter:image" content="/calixte.png" />

  </head>
  <body style="background-color: #FFFFFF; color: #0F172A; margin: 0; padding: 0;">
    <!-- Point d'ancrage de votre application React -->
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
